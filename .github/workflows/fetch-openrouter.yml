name: Fetch OpenRouter Prices

# 1000% Reliability Design v3 (2026-04-15 多重化版)
# - Schedule 多重化: 各便を +7min でダブルショット化 (scheduler揺らぎ耐性)
# - 本便は 07:30/10:30/13:30 JST、バックアップは 07:37/10:37/13:37 JST
# - Idempotent: 各ショットは今日(JST)完了済みなら skip
# - Internal retry: 3 attempts with exponential backoff
# - GitHub単一依存ではなくなった: 層5 (Windows Task Scheduler 15:30 JST) + 層6 (Director /prime) が救援

on:
  schedule:
    # 1st flight: 07:30 / 07:37 JST
    - cron: '30 22 * * *'   # 22:30 UTC = 07:30 JST
    - cron: '37 22 * * *'   # 22:37 UTC = 07:37 JST (backup shot)
    # 2nd flight: 10:30 / 10:37 JST
    - cron: '30 1 * * *'    # 01:30 UTC = 10:30 JST
    - cron: '37 1 * * *'    # 01:37 UTC = 10:37 JST
    # 3rd flight: 13:30 / 13:37 JST
    - cron: '30 4 * * *'    # 04:30 UTC = 13:30 JST
    - cron: '37 4 * * *'    # 04:37 UTC = 13:37 JST
  workflow_dispatch:       # Manual trigger

concurrency:
  group: fetch-openrouter
  cancel-in-progress: false

env:
  TZ: Asia/Tokyo   # 全step JST強制（冪等ガード日付ミスマッチ防止）

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pull latest (prevent rebase conflicts)
        run: git pull --rebase origin main

      - name: Check idempotency (skip if today JST already done)
        id: check
        run: |
          TODAY=$(TZ=Asia/Tokyo date +%Y-%m-%d)
          echo "JST TODAY: ${TODAY}"
          if [ -f "data/snapshots/${TODAY}.json" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "✅ Already updated today JST (${TODAY}). Skipping."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "🔄 No update yet for JST ${TODAY}. Proceeding."
          fi

      - name: Setup Python
        if: steps.check.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        if: steps.check.outputs.skip != 'true'
        run: pip install requests

      - name: Fetch & Diff prices (retry 3 times with backoff)
        if: steps.check.outputs.skip != 'true'
        run: |
          set +e
          MAX_ATTEMPTS=3
          for i in $(seq 1 $MAX_ATTEMPTS); do
            echo "=== Attempt $i of $MAX_ATTEMPTS ==="
            python scripts/diff_prices.py
            RESULT=$?
            if [ $RESULT -eq 0 ]; then
              echo "✅ Success on attempt $i"
              exit 0
            fi
            echo "⚠️ Attempt $i failed (exit=$RESULT)"
            if [ $i -lt $MAX_ATTEMPTS ]; then
              SLEEP=$((i * 30))
              echo "Sleeping ${SLEEP}s before retry..."
              sleep $SLEEP
            fi
          done
          echo "❌ All $MAX_ATTEMPTS attempts failed"
          exit 1

      - name: Commit and push with rebase retry
        if: steps.check.outputs.skip != 'true'
        run: |
          set +e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          TODAY=$(TZ=Asia/Tokyo date +%Y-%m-%d)
          git commit -m "price update ${TODAY} [auto]"
          MAX_PUSH=3
          for i in $(seq 1 $MAX_PUSH); do
            echo "=== Push attempt $i ==="
            git pull --rebase origin main
            git push origin main
            if [ $? -eq 0 ]; then
              echo "✅ Push succeeded on attempt $i"
              exit 0
            fi
            echo "⚠️ Push attempt $i failed"
            sleep $((i * 10))
          done
          echo "❌ All push attempts failed"
          exit 1
