name: Fetch OpenRouter Prices

on:
  schedule:
    - cron: '0 7 * * *'  # 毎日07:00 UTC = 16:00 JST
  workflow_dispatch:     # 手動トリガー（テスト用）

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Fetch & Diff prices
        run: python scripts/diff_prices.py

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "price update $(date +%Y-%m-%d)"
          git push
