name: Data Freshness Watchdog

# Watchdog (最終救援便) - 2026-04-14
# Purpose: If all 3 regular flights failed for OPT or GAJT, this watchdog
#          fires at 14:00 UTC (23:00 JST) and forcibly re-triggers them.
# This is NOT a failure notification — it's a physical recovery mechanism.

on:
  schedule:
    - cron: '0 14 * * *'   # 14:00 UTC = 23:00 JST daily (after all 3 flights)
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      actions: write   # Required to trigger other workflows

    steps:
      - uses: actions/checkout@v4

      - name: Check OPT freshness
        id: opt_check
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          if [ -f "data/snapshots/${TODAY}.json" ]; then
            echo "opt_stale=false" >> $GITHUB_OUTPUT
            echo "✅ OPT fresh (${TODAY} snapshot exists)"
          else
            echo "opt_stale=true" >> $GITHUB_OUTPUT
            echo "🔴 OPT STALE — no snapshot for ${TODAY}"
          fi

      - name: Check GAJT freshness
        id: gajt_check
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          if [ -f "data/gajt/snapshots/${TODAY}.json" ]; then
            echo "gajt_stale=false" >> $GITHUB_OUTPUT
            echo "✅ GAJT fresh (${TODAY} snapshot exists)"
          else
            echo "gajt_stale=true" >> $GITHUB_OUTPUT
            echo "🔴 GAJT STALE — no snapshot for ${TODAY}"
          fi

      - name: Force-trigger OPT workflow if stale
        if: steps.opt_check.outputs.opt_stale == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Triggering fetch-openrouter.yml via workflow_dispatch"
          gh workflow run fetch-openrouter.yml

      - name: Force-trigger GAJT workflow if stale
        if: steps.gajt_check.outputs.gajt_stale == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Triggering fetch-gajt.yml via workflow_dispatch"
          gh workflow run fetch-gajt.yml

      - name: Create recovery record
        if: steps.opt_check.outputs.opt_stale == 'true' || steps.gajt_check.outputs.gajt_stale == 'true'
        run: |
          mkdir -p data/watchdog
          TODAY=$(date -u +%Y-%m-%d)
          TIME=$(date -u +%H:%M:%SZ)
          cat > data/watchdog/${TODAY}_recovery.json <<EOF
          {
            "date": "${TODAY}",
            "triggered_at": "${TIME}",
            "opt_stale": ${{ steps.opt_check.outputs.opt_stale }},
            "gajt_stale": ${{ steps.gajt_check.outputs.gajt_stale }},
            "action": "forced workflow_dispatch"
          }
          EOF
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/watchdog/
          git commit -m "watchdog recovery ${TODAY}"
          git pull --rebase origin main
          git push origin main
