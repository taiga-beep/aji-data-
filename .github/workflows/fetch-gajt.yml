name: Fetch GAJT Data

# 10000% Reliability Design v2 (2026-04-14 朝シフト版)
# - 3-flight schedule (JST 朝シフト): 08:00 / 11:00 / 14:00 JST daily
#   (30min offset from OPT to avoid push collision)
# - Idempotent: each flight skips if today (JST) already succeeded
# - Internal retry: 3 attempts with exponential backoff (handles ATS API timeouts)
# - No local PC dependency
# - Date basis: JST全統一 (gajt_update.py も JST化済)

on:
  schedule:
    # JST 08:00 = UTC 前日 23:00
    - cron: '0 23 * * *'    # 1st flight: 23:00 UTC = 08:00 JST (翌朝)
    # JST 11:00 = UTC 02:00
    - cron: '0 2 * * *'     # 2nd flight: 02:00 UTC = 11:00 JST (auto-recovery)
    # JST 14:00 = UTC 05:00
    - cron: '0 5 * * *'     # 3rd flight: 05:00 UTC = 14:00 JST (final recovery)
  workflow_dispatch:

concurrency:
  group: fetch-gajt
  cancel-in-progress: false

env:
  TZ: Asia/Tokyo   # 全step JST強制（冪等ガード日付ミスマッチ防止）

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 20   # ATS API scraping can be slow
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pull latest (prevent rebase conflicts)
        run: git pull --rebase origin main

      - name: Check idempotency (skip if today JST already done)
        id: check
        run: |
          TODAY=$(TZ=Asia/Tokyo date +%Y-%m-%d)
          echo "JST TODAY: ${TODAY}"
          if [ -f "data/gajt/snapshots/${TODAY}.json" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "✅ Already updated today JST (${TODAY}). Skipping."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "🔄 No update yet for JST ${TODAY}. Proceeding."
          fi

      - uses: actions/setup-python@v5
        if: steps.check.outputs.skip != 'true'
        with:
          python-version: '3.11'

      - name: Install dependencies
        if: steps.check.outputs.skip != 'true'
        run: pip install requests

      - name: Run GAJT update (retry 3 times with backoff)
        if: steps.check.outputs.skip != 'true'
        run: |
          set +e
          MAX_ATTEMPTS=3
          for i in $(seq 1 $MAX_ATTEMPTS); do
            echo "=== Attempt $i of $MAX_ATTEMPTS ==="
            python scripts/gajt_update.py
            RESULT=$?
            if [ $RESULT -eq 0 ]; then
              echo "✅ Success on attempt $i"
              exit 0
            fi
            echo "⚠️ Attempt $i failed (exit=$RESULT) — likely ATS API timeout"
            if [ $i -lt $MAX_ATTEMPTS ]; then
              SLEEP=$((i * 60))
              echo "Sleeping ${SLEEP}s before retry..."
              sleep $SLEEP
            fi
          done
          echo "❌ All $MAX_ATTEMPTS attempts failed"
          exit 1

      - name: Commit and push with rebase retry
        if: steps.check.outputs.skip != 'true'
        run: |
          set +e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          TODAY=$(TZ=Asia/Tokyo date +%Y-%m-%d)
          git commit -m "gajt update ${TODAY} [auto]"
          MAX_PUSH=3
          for i in $(seq 1 $MAX_PUSH); do
            echo "=== Push attempt $i ==="
            git pull --rebase origin main
            git push origin main
            if [ $? -eq 0 ]; then
              echo "✅ Push succeeded on attempt $i"
              exit 0
            fi
            echo "⚠️ Push attempt $i failed"
            sleep $((i * 10))
          done
          echo "❌ All push attempts failed"
          exit 1
